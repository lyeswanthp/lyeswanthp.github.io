name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Apr 14 2026 static build + light-mode CSS fixes in legacy-snapshot-538b9a9/assets/
      - name: Copy favicon into legacy snapshot
        run: cp portfolio-new/public/vite.svg legacy-snapshot-538b9a9/vite.svg

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: legacy-snapshot-538b9a9

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
